<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="color-scheme" content="light" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tuhfa Al-Muhtaaj – Sessions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { background: #fafaf9; color: #37352f; color-scheme: light; }
      body {
        font-family: Inter, -apple-system, system-ui, 'Segoe UI', Helvetica, sans-serif;
        font-size: 16px;
        line-height: 1.55;
        color: #37352f;
        background: #fafaf9;
      }

      /* ── Header ── */
      .site-header {
        background: #0a1530;
        padding: 0 32px;
        height: 56px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .site-header a {
        color: #a4a0c8;
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
        transition: color 0.12s;
      }
      .site-header a:hover { color: #ffffff; }
      .site-header .sep { color: #3a4a72; font-size: 14px; }
      .site-header .current { color: #d0ccf0; font-size: 14px; font-weight: 500; }

      /* ── Hero ── */
      .hero {
        background: #0a1530;
        color: #ffffff;
        padding: 36px 32px 48px;
      }
      .hero-inner {
        max-width: 860px;
        margin: 0 auto;
      }
      .hero h1 {
        font-size: clamp(24px, 4vw, 36px);
        font-weight: 600;
        line-height: 1.15;
        letter-spacing: -0.5px;
        color: #ffffff;
        margin-bottom: 10px;
      }

        font-size: 15px;
